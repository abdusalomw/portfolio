<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RB Garage</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    background:#050505;
    font-family:Arial, Helvetica, sans-serif;
}

/* MAIN GARAGE */

.garage{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;

    background:
    radial-gradient(circle at center,
    rgba(0,170,255,0.08),
    transparent 60%),
    linear-gradient(to bottom,
    #0b0b0b,
    #050505);
}

/* TOP LIGHT */

.top-light{
    position:absolute;
    top:-250px;
    left:50%;
    transform:translateX(-50%);

    width:900px;
    height:500px;

    background:#00bfff22;
    filter:blur(130px);
}

/* SIDE LIGHTS */

.left-light{
    position:absolute;
    left:-200px;
    top:50%;

    transform:translateY(-50%);

    width:500px;
    height:500px;

    background:#00bfff18;
    filter:blur(150px);
}

.right-light{
    position:absolute;
    right:-200px;
    top:50%;

    transform:translateY(-50%);

    width:500px;
    height:500px;

    background:#00bfff18;
    filter:blur(150px);
}

/* FLOOR */

.floor{
    position:absolute;
    bottom:-120px;
    left:0;

    width:100%;
    height:350px;

    background:
    linear-gradient(
    to top,
    rgba(255,255,255,0.08),
    transparent);

    transform:
    perspective(1000px)
    rotateX(75deg);

    transform-origin:bottom;
}

/* GRID FLOOR */

.floor::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);

    background-size:80px 80px;
}

/* MODEL */

model-viewer{
    width:100%;
    height:100vh;
    position:absolute;
    top:0;
    left:0;

    background:transparent;
}

/* TITLE */

.title{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;

    color:white;
    font-size:22px;
    letter-spacing:8px;
    font-weight:bold;
}

/* BOTTOM TEXT */

.bottom{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);

    color:#9e9e9e;
    font-size:14px;
    letter-spacing:3px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .title{
        font-size:16px;
        letter-spacing:4px;
    }

}

</style>
</head>
<body>

<div class="garage">

<div class="top-light"></div>
<div class="left-light"></div>
<div class="right-light"></div>

<div class="floor"></div>

<div class="title">
RB GARAGE
</div>

<!-- ======================= -->
<!-- YOUR 3D MODEL HERE -->
<!-- ======================= -->

<model-viewer

src="rb.glb"

camera-controls
auto-rotate
shadow-intensity="1"
exposure="1"

environment-image="neutral"

disable-pan

>

</model-viewer>

<div class="bottom">
ESHONQULOV PARTS • 3D EXPERIENCE
</div>

</div>

</body>
</html>
